name: Deploy

on:
  push:
    branches:
      - main
      - staging
  workflow_dispatch:
    inputs:
      environment:
        description: Deployment target
        required: true
        type: choice
        options:
          - staging
          - prod

env:
  REGISTRY_URL: ghcr.io

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || github.ref_name == 'main' && 'prod' || 'staging' }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve deployment metadata
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            DEPLOY_ENV="${{ inputs.environment }}"
          elif [ "${{ github.ref_name }}" = "main" ]; then
            DEPLOY_ENV="prod"
          else
            DEPLOY_ENV="staging"
          fi

          REPO_LOWER="$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')"

          {
            echo "DEPLOY_ENV=${DEPLOY_ENV}"
            echo "REPO_LOWER=${REPO_LOWER}"
            echo "IMAGE_TAG=${{ github.sha }}"
            echo "REMOTE_DIR=~/crud-tareas/${DEPLOY_ENV}"
            echo "COMPOSE_PROJECT_NAME=crud-tareas-${DEPLOY_ENV}"
          } >> "${GITHUB_ENV}"

      - name: Generate deploy .env
        env:
          GITHUB_VARS_JSON: ${{ toJSON(vars) }}
          GITHUB_SECRETS_JSON: ${{ toJSON(secrets) }}
          APP_PORT: ${{ vars.APP_PORT }}
          DB_PORT: ${{ vars.DB_PORT }}
          DEV_APP_PORT: ${{ vars.DEV_APP_PORT }}
          POSTGRES_DB: ${{ vars.POSTGRES_DB }}
          POSTGRES_USER: ${{ vars.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
        run: |
          bash .github/scripts/generate-dotenv.sh .env.example .env

          {
            printf 'REGISTRY_URL=%s\n' "${REGISTRY_URL}"
            printf 'GITHUB_REPOSITORY=%s\n' "${REPO_LOWER}"
            printf 'IMAGE_TAG=%s\n' "${IMAGE_TAG}"
            printf 'COMPOSE_PROJECT_NAME=%s\n' "${COMPOSE_PROJECT_NAME}"
          } >> .env

          if [ -n "${APP_PORT}" ]; then
            printf 'APP_PORT=%s\n' "${APP_PORT}" >> .env
          fi

          if [ -n "${DB_PORT}" ]; then
            printf 'DB_PORT=%s\n' "${DB_PORT}" >> .env
          fi

          if [ -n "${DEV_APP_PORT}" ]; then
            printf 'DEV_APP_PORT=%s\n' "${DEV_APP_PORT}" >> .env
          fi

          if [ -n "${POSTGRES_DB}" ]; then
            printf 'POSTGRES_DB=%s\n' "${POSTGRES_DB}" >> .env
          fi

          if [ -n "${POSTGRES_USER}" ]; then
            printf 'POSTGRES_USER=%s\n' "${POSTGRES_USER}" >> .env
          fi

          if [ -n "${POSTGRES_PASSWORD}" ]; then
            printf 'POSTGRES_PASSWORD=%s\n' "${POSTGRES_PASSWORD}" >> .env
          fi

      - name: Validate compose config
        run: docker compose --profile "${DEPLOY_ENV}" config >/dev/null

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        run: |
          docker compose --profile "${DEPLOY_ENV}" build fastapi
          docker compose --profile "${DEPLOY_ENV}" push fastapi

      - name: Copy deployment bundle
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ vars.SSH_PORT }}
          source: "compose.yml,.env,db/"
          target: "${{ env.REMOTE_DIR }}"

      - name: Deploy remotely
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ vars.SSH_PORT }}
          script: |
            set -euo pipefail

            mkdir -p "${{ env.REMOTE_DIR }}"
            cd "${{ env.REMOTE_DIR }}"

            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            docker compose --profile "${{ env.DEPLOY_ENV }}" pull fastapi
            docker compose --profile "${{ env.DEPLOY_ENV }}" up -d --remove-orphans
            docker image prune -f
