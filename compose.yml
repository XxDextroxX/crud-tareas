services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:${DB_PORT:-5438}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-talima}
      POSTGRES_USER: ${POSTGRES_USER:-root}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-root} -d $${POSTGRES_DB:-talima}" ]
      interval: 3s
      timeout: 5s
      retries: 5

  fastapi-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    profiles: [ "dev" ]
    ports:
      - "127.0.0.1:${DEV_APP_PORT:-8050}:8000"
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env

  fastapi:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    profiles: [ "staging", "prod" ]
    ports:
      - "127.0.0.1:${APP_PORT:-8060}:8000"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env

volumes:
  postgres_data:
